image: registry.gitlab.com/wylieyyyy/isometric-drawing:latest

stages:
    - lint
    - test
    - build
    - deploy

default:
    cache:
        key: $CI_COMMIT_REF_SLUG
        paths:
            - node_modules
    before_script:
        - npm install

lint:
    stage: lint
    script:
        - npm run lint

test:
    stage: test
    script:
        - npm run test

build:
    stage: build
    script:
        - npm run build
        - npm run build:lib
        - npm run docs
    artifacts:
        paths:
            - dist

pages:
    stage: deploy
    script:
        - 'true'
    dependencies:
        - build
    artifacts:
        paths:
            - dist
    publish: dist
    only:
        - pages
